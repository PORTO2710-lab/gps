<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servicio de Geolocalización</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
    body {
        margin: 0;
        background-color: #0f0f0f;
        font-family: Arial, Helvetica, sans-serif;
    }

    .search-container {
        width: 100%;
        padding: 15px;
        background-color: #111;
        display: flex;
        justify-content: center;
        gap: 10px;
        box-sizing: border-box;
    }

    .search-container input {
        width: 70%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        font-size: 16px;
        outline: none;
    }

    .search-container button {
        padding: 12px 20px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        background-color: #ffffff;
        font-weight: bold;
        transition: 0.3s;
    }

    .search-container button:hover {
        background-color: #dcdcdc;
    }

    #map {
        height: calc(100vh - 80px);
        width: 95%;
        margin: 20px auto;
        border-radius: 20px;
    }
</style>
</head>

<body>

<div class="search-container">
    <input type="text" id="address" placeholder="Buscar dirección...">
    <button onclick="buscarDireccion()">Buscar</button>
</div>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    // Inicializar mapa
    var map = L.map('map').setView([19.4326, -99.1332], 13); // CDMX por defecto

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    var marker;

    function buscarDireccion() {
        var direccion = document.getElementById("address").value;

        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${direccion}`)
        .then(response => response.json())
        .then(data => {
            if (data.length > 0) {
                var lat = data[0].lat;
                var lon = data[0].lon;

                map.setView([lat, lon], 16);

                if (marker) {
                    map.removeLayer(marker);
                }

                marker = L.marker([lat, lon]).addTo(map)
                    .bindPopup(direccion)
                    .openPopup();
            } else {
                alert("Dirección no encontrada");
            }
        })
        .catch(error => {
            alert("Error al buscar la dirección");
        });
    }
</script>

</body>
</html>
